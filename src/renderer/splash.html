<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Froggy on RAG</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }
    .root {
      position: relative;
      width: 100%;
      height: 100%;
      background: center / contain no-repeat url('../../images/Froggy RAG - Splash.png');
    }
    .version {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      margin: 0;
      padding: 12px 16px 16px;
      text-align: center;
      font: 13px system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: #f2f2f2;
      letter-spacing: 0.02em;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.85), 0 0 12px rgba(0, 0, 0, 0.5);
      background: linear-gradient(to top, rgba(0, 0, 0, 0.55), transparent);
    }
  </style>
</head>
<body>
  <div class="root">
    <p class="version" id="version-line"></p>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var v = params.get('version') || '';
    document.getElementById('version-line').textContent = v ? 'v' + v : '';
  </script>
</body>
</html>
